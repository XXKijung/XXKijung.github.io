    <h2>속초 대포항</h2>
    <p> 예전에는 배를 댈 공간이 없을 정도로 항구에 어선이 많았고 새벽에 고기를 잡아 돌아온 어선
    으로 북적였다. 항구로 들어오는 진입로 양옆에는 건어물 가게와 횟집이 늘어서 있고, 어판장 쪽에
    는 활어 난전이 형성되어 있었다. 요즘은 동해 고속도로가 개통되어 현대적인 시설의 호텔과 콘도,
    깔끔한 횟집이 많이 들어섰다 .</p>
