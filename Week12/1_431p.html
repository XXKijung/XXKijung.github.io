<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        body{
            font-size:200%;
        }
        /* 100% = 16px */

        #a{
            font-size:150%;
        }
        /* 기본 폰트(해당 코드에선 body로 지정됨)의 1.5배 */

        #b{
            font-size:2em;
        }
        /* 기본 폰트(해당 코드에선 body로 지정됨)의 2배(200%) */
    </style>

</head>
<body>
    Hello! I'm Genius!!!
    <div id="a">Hello! I'm Genius!!!</div>
    <div id="b">Hello! I'm Genius!!!</div>    

</body>
</html>
